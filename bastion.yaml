AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for a single-instance bastion host'
Parameters:
  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name
  EnvironmentType:
    Description: "Specify which env to run in"
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
  LatestAmiId:
    Type:  'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
  KeyName:
    Description: Name of an existing EC2 KeyPair for SSH
    Type: AWS::EC2::KeyPair::KeyName

Mappings:
  EnvironmentTypeToInstanceType:
    dev:
      InstanceType: t2.nano
    test:
      InstanceType: t2.micro
    prod:
      InstanceType: t2.small

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
  InternetGateway:
    Type: AWS::EC2::InternetGateway
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  Subnet10:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AvailabilityZone
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      MapPublicIpOnLaunch: true
  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
  InternetRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref RouteTable
  Subnet10RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTable
      SubnetId: !Ref Subnet10
  BastionInstance:
    Type: AWS::EC2::Instance
    Properties:
      AvailabilityZone: !Ref AvailabilityZone
      ImageId: !Ref LatestAmiId
      InstanceType:
        !FindInMap [EnvironmentTypeToInstanceType, !Ref EnvironmentType, InstanceType]
      SubnetId: !Ref Subnet10
      # Normal operations: InboundAccessSecurityGroup allows shell access from inside the VPC network.
      # Incident response containment action:
      # To isolate the bastion during an investigation, update this list from:
      # SecurityGroupIds:
      #   - !Ref 'InboundAccessSecurityGroup'
      # to:
      # SecurityGroupIds:
      #   - !Ref 'BastionIsolationSecurityGroup'
      SecurityGroupIds:
        - !Ref 'InboundAccessSecurityGroup'
      KeyName: !Ref 'KeyName'
  InboundAccessSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow inbound tcp on SSH port"
      VpcId: !Ref VPC
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 10.0.0.0/16
  BastionIsolationSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Isolate the bastion during incident response"
      VpcId: !Ref VPC
      # Incident Response Playbook - Bastion Isolation
      # Scenario: Automated monitoring detects anomalous network activity from the bastion host.
      # 1. Confirm the alert and preserve relevant logs before making containment changes.
      # 2. Contain the host by replacing InboundAccessSecurityGroup with BastionIsolationSecurityGroup
      #    in the BastionInstance SecurityGroupIds list above.
      # 3. This isolation security group has no inbound rules, blocking SSH and all other inbound traffic.
      # 4. The egress rule below removes the default allow-all outbound behavior and only allows localhost traffic.
      # 5. Investigate using preserved logs, snapshots, CloudTrail, VPC Flow Logs, and other available evidence.
      # 6. Rebuild or remediate the bastion before restoring normal network access.
      SecurityGroupEgress:
      - IpProtocol: "-1"
        CidrIp: 127.0.0.1/32

Outputs:
  InstanceId:
    Description: InstanceId of the newly created EC2 instance
    Value: !Ref 'BastionInstance'
  URI:
    Description: URI that points to public SSH end point
    Value: !Sub ssh://${BastionInstance.PublicDnsName}
